name: StackLight
options:
  xcodeVersion: "26.0"
  deploymentTarget:
    macOS: "13.0"
    iOS: "26.0"
  groupSortPosition: none
  createIntermediateGroups: true

packages:
  AppStoreConnect-Swift-SDK:
    url: https://github.com/AvdLee/appstoreconnect-swift-sdk.git
    majorVersion: 4.0.0

targets:
  StackLight:
    type: application
    platform: macOS
    sources:
      - path: Sources/StackLight
        excludes:
          - "Info.plist"
          - "StackLight.entitlements"
    info:
      path: Sources/StackLight/Info.plist
      properties:
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: StackLight
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.developer-tools
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yellowplus.StackLight
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        CODE_SIGN_ENTITLEMENTS: Sources/StackLight/StackLight.entitlements
        ENABLE_APP_SANDBOX: true
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: AppStoreConnect-Swift-SDK

  StackLightiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/StackLight/Core
      - path: Sources/StackLight/Providers
      - path: Sources/StackLight/Assets.xcassets
      - path: Sources/StackLight/AppIcon.icon
      - path: Sources/StackLightiOS
        excludes:
          - "Resources/Info.plist"
          - "Resources/StackLightiOS.entitlements"
    info:
      path: Sources/StackLightiOS/Resources/Info.plist
      properties:
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: StackLight
        CFBundleDisplayName: StackLight
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UIBackgroundModes:
          - fetch
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        BGTaskSchedulerPermittedIdentifiers:
          - app.yellowplus.StackLight.refresh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yellowplus.StackLight
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        CODE_SIGN_ENTITLEMENTS: Sources/StackLightiOS/Resources/StackLightiOS.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        MTL_ENABLE_DEBUG_INFO: "INCLUDE_SOURCE"
        MTL_FAST_MATH: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: AppStoreConnect-Swift-SDK
      - target: StackLightWidgets
        embed: true
        codeSign: true

  StackLightWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/StackLight/Core
      - path: Sources/StackLight/Providers
      - path: Sources/StackLightWidgets
        excludes:
          - "Resources/Info.plist"
          - "Resources/StackLightWidgets.entitlements"
    info:
      path: Sources/StackLightWidgets/Resources/Info.plist
      properties:
        CFBundleDisplayName: StackLight
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yellowplus.StackLight.widgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        CODE_SIGN_ENTITLEMENTS: Sources/StackLightWidgets/Resources/StackLightWidgets.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SKIP_INSTALL: YES
    dependencies:
      - package: AppStoreConnect-Swift-SDK

  StackLightTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/StackLightTests
    dependencies:
      - target: StackLight
    settings:
      base:
        SWIFT_VERSION: "5.9"
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": app.yellowplus.StackLight.test
