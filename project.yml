name: StackLight
options:
  xcodeVersion: "26.0"
  deploymentTarget:
    macOS: "13.0"
    iOS: "26.0"
    watchOS: "10.0"
  groupSortPosition: none
  createIntermediateGroups: true

packages:
  AppStoreConnect-Swift-SDK:
    url: https://github.com/AvdLee/appstoreconnect-swift-sdk.git
    majorVersion: 4.0.0

targets:
  StackLight:
    type: application
    platform: macOS
    sources:
      - path: Sources/StackLight
        excludes:
          - "Info.plist"
          - "StackLight.entitlements"
    info:
      path: Sources/StackLight/Info.plist
      properties:
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: StackLight
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.developer-tools
        LSUIElement: true
        StackLightDistributionChannel: $(STACKLIGHT_DISTRIBUTION_CHANNEL)
        StackLightGitHubRepository: hwangdev97/Stacklight
        StackLightGitHubReleasesURL: https://github.com/hwangdev97/Stacklight/releases/latest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yellowplus.StackLight
        STACKLIGHT_DISTRIBUTION_CHANNEL: mac-app-store
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        CODE_SIGN_ENTITLEMENTS: Sources/StackLight/StackLight.entitlements
        ENABLE_APP_SANDBOX: true
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: AppStoreConnect-Swift-SDK

  StackLightiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/StackLight/Core
      - path: Sources/StackLight/Providers
      - path: Sources/StackLight/Assets.xcassets
      - path: Sources/StackLight/AppIcon.icon
      - path: Sources/StackLightiOS
        excludes:
          - "Resources/Info.plist"
          - "Resources/StackLightiOS.entitlements"
    info:
      path: Sources/StackLightiOS/Resources/Info.plist
      properties:
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: StackLight
        CFBundleDisplayName: StackLight
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: app.yellowplus.StackLight
            CFBundleURLSchemes:
              - stacklight
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UIBackgroundModes:
          - fetch
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        BGTaskSchedulerPermittedIdentifiers:
          - app.yellowplus.StackLight.refresh
        NSUserActivityTypes:
          - app.yellowplus.StackLight.openDeployment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yellowplus.StackLight
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        CODE_SIGN_ENTITLEMENTS: Sources/StackLightiOS/Resources/StackLightiOS.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        MTL_ENABLE_DEBUG_INFO: "INCLUDE_SOURCE"
        MTL_FAST_MATH: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: AppStoreConnect-Swift-SDK
      - target: StackLightWidgets
        embed: true
        codeSign: true
      - target: StackLightWatch
        embed: true
        codeSign: true

  StackLightWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources/StackLight/Core/Deployment.swift
      - path: Sources/StackLight/Core/Deployment+Codable.swift
      - path: Sources/StackLight/Core/SharedStore.swift
      - path: Sources/StackLight/Core/AppConfig.swift
      - path: Sources/StackLight/Core/WidgetRefresh.swift
      - path: Sources/StackLight/AppIcon.icon
      - path: Sources/StackLightWidgets/Views/WidgetStatusBadge.swift
      - path: Sources/StackLightWatch
        excludes:
          - "Resources/Info.plist"
          - "Resources/StackLightWatch.entitlements"
    info:
      path: Sources/StackLightWatch/Resources/Info.plist
      properties:
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: StackLight
        CFBundleDisplayName: StackLight
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKCompanionAppBundleIdentifier: app.yellowplus.StackLight
        WKWatchOnly: false
        NSUserActivityTypes:
          - app.yellowplus.StackLight.openDeployment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yellowplus.StackLight.watchkitapp
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        CODE_SIGN_ENTITLEMENTS: Sources/StackLightWatch/Resources/StackLightWatch.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: StackLightWatchComplications
        embed: true
        codeSign: true

  StackLightWatchComplications:
    type: app-extension
    platform: watchOS
    sources:
      - path: Sources/StackLight/Core/Deployment.swift
      - path: Sources/StackLight/Core/Deployment+Codable.swift
      - path: Sources/StackLight/Core/SharedStore.swift
      - path: Sources/StackLight/Core/AppConfig.swift
      - path: Sources/StackLightWidgets/Views/WidgetStatusBadge.swift
      - path: Sources/StackLightWatchComplications
        excludes:
          - "Resources/Info.plist"
          - "Resources/StackLightWatchComplications.entitlements"
    info:
      path: Sources/StackLightWatchComplications/Resources/Info.plist
      properties:
        CFBundleDisplayName: StackLight
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yellowplus.StackLight.watchkitapp.complications
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        CODE_SIGN_ENTITLEMENTS: Sources/StackLightWatchComplications/Resources/StackLightWatchComplications.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SKIP_INSTALL: YES

  StackLightWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/StackLight/Core
      - path: Sources/StackLight/Providers
      - path: Sources/StackLightWidgets
        excludes:
          - "Resources/Info.plist"
          - "Resources/StackLightWidgets.entitlements"
    info:
      path: Sources/StackLightWidgets/Resources/Info.plist
      properties:
        CFBundleDisplayName: StackLight
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yellowplus.StackLight.widgets
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        CODE_SIGN_ENTITLEMENTS: Sources/StackLightWidgets/Resources/StackLightWidgets.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SKIP_INSTALL: YES
    dependencies:
      - package: AppStoreConnect-Swift-SDK

  StackLightTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/StackLightTests
    dependencies:
      - target: StackLight
    settings:
      base:
        SWIFT_VERSION: "5.9"
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": app.yellowplus.StackLight.test
