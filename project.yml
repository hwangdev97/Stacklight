name: ShapeBar
options:
  xcodeVersion: "26.0"
  deploymentTarget:
    macOS: "13.0"
  groupSortPosition: none
  createIntermediateGroups: true

packages:
  AppStoreConnect-Swift-SDK:
    url: https://github.com/AvdLee/appstoreconnect-swift-sdk.git
    majorVersion: 4.0.0

targets:
  ShapeBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/ShapeBar
        excludes:
          - "Info.plist"
    info:
      path: Sources/ShapeBar/Info.plist
      properties:
        CFBundleIdentifier: com.shapebar.app
        CFBundleName: ShapeBar
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shapebar.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: AppStoreConnect-Swift-SDK

  ShapeBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ShapeBarTests
    dependencies:
      - target: ShapeBar
    settings:
      base:
        SWIFT_VERSION: "5.9"
